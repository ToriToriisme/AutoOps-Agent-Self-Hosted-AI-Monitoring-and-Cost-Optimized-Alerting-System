name: AutoOps Agent CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: CI - Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Linter (Flake8)
        run: |
          flake8 agent_api/ --count --select=E9,F63,F7,F82 --show-source --statistics

  security-scan:
    name: CI - Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Scanner
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Security Scan (Bandit)
        run: |
          bandit -r agent_api/ \
            -x "agent_api/test_*.py,agent_api/workload_simulator.py,agent_api/seed_knowledge.py,agent_api/show_logs.py,agent_api/.venv/*" \
            --severity-level high \
            --confidence-level high \
            -f txt || true

  test:
    name: CI - Integration Test
    needs: [lint, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f agent_api/requirements.txt ]; then pip install -r agent_api/requirements.txt; fi

      - name: Run Integration Tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: |
          cd agent_api
          python test_flows.py

  build-and-push:
    name: CI - Build and Push Docker
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./agent_api
          file: ./agent_api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  cd-gate:
    name: CD Gate - Manual Approval
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Approval Confirmed
        run: echo "Manual approval granted. Proceeding to deploy."

  deploy:
    name: CD - Deploy Production
    needs: cd-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            cd /opt/autoops-agent
            docker-compose down
            docker-compose up -d

  health-check:
    name: CD - Health Check
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Wait for service startup
        run: sleep 10

      - name: Check API Health
        run: |
          HEALTH_URL="http://${{ secrets.DEPLOY_HOST }}:8000/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Health check passed"
          else
            echo "Health check failed with HTTP code $HTTP_CODE"
            exit 1
          fi

  notify:
    name: Notify via Telegram
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Send Telegram Notification
        run: |
          STATUS="${{ needs.build-and-push.result }}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1 || echo "No commit message")

          if [ "$STATUS" = "success" ]; then
            TEXT="AutoOps CI/CD: SUCCESS%0A%0ABranch: \`${{ github.ref_name }}\`%0ACommit: \`${{ github.sha }}\`%0AMessage: $COMMIT_MSG%0A%0ADocker image pushed to GHCR."
          else
            TEXT="AutoOps CI/CD: FAILED%0A%0ABranch: \`${{ github.ref_name }}\`%0ACommit: \`${{ github.sha }}\`%0A%0ACheck GitHub Actions logs for details."
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT" \
            -d "parse_mode=Markdown"
